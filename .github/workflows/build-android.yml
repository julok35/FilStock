name: Build Android APK

on:
  push:
    branches: [native-app, "claude/mobile-app-conversion-plan-SYrf1", "claude/fix-apk-android-Kf6an"]
  workflow_dispatch: # déclenchement manuel depuis l'onglet Actions de GitHub

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Generate Tauri icons
        run: |
          # Crée une image source 512x512 valide via Python (pas de dépendance externe)
          python3 - <<'PYEOF'
          import struct, zlib, os

          def make_png(w, h, r=33, g=150, b=243):
              def chunk(tag, data):
                  crc = zlib.crc32(tag + data) & 0xFFFFFFFF
                  return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', crc)
              raw = b''.join(b'\x00' + bytes([r, g, b] * w) for _ in range(h))
              return (b'\x89PNG\r\n\x1a\n'
                      + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
                      + chunk(b'IDAT', zlib.compress(raw, 9))
                      + chunk(b'IEND', b''))

          os.makedirs('src-tauri/icons', exist_ok=True)
          with open('app-icon.png', 'wb') as f:
              f.write(make_png(512, 512))
          print('Source icon app-icon.png created (512x512)')
          PYEOF

          # Génère tous les formats d'icônes requis par Tauri (desktop + Android)
          npx tauri icon app-icon.png

          echo "=== Icônes générées ==="
          ls -la src-tauri/icons/

      - name: Initialize Tauri Android project
        run: npx tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Commit gen/android config (première fois uniquement)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/gen/android/
          if git diff --cached --quiet; then
            echo "gen/android déjà à jour, rien à commiter"
          else
            BRANCH="${GITHUB_REF#refs/heads/}"
            git pull --rebase origin "$BRANCH" || true
            git commit -m "ci: sauvegarder config Android générée par tauri android init [skip ci]"
            git push origin HEAD:"$BRANCH"
          fi

      - name: Build Android APK (split par ABI)
        # arm64-v8a (~3 Mo) + armeabi-v7a (~2.5 Mo) au lieu d'un universal (~10 Mo)
        run: npx tauri android build --apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          CARGO_INCREMENTAL: "0"

      - name: Sign APK avec debug keystore
        run: |
          # Générer un keystore de debug éphémère
          keytool -genkeypair \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

          APK_DIR="src-tauri/gen/android/app/build/outputs/apk"
          echo "=== APK trouvés avant signature ==="
          find "$APK_DIR" -name "*.apk" | sort

          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner"
          echo "apksigner : $APKSIGNER"

          find "$APK_DIR" -name "*.apk" | while read APK; do
            SIGNED="${APK%.apk}-signed.apk"
            "$APKSIGNER" sign \
              --ks debug.keystore \
              --ks-key-alias androiddebugkey \
              --ks-pass pass:android \
              --key-pass pass:android \
              --out "$SIGNED" \
              "$APK"
            echo "Signé : $SIGNED"
          done

          echo "=== APK signés ==="
          find "$APK_DIR" -name "*-signed.apk" | sort

      - name: Upload APK signé
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: filstock-apk-signed
          path: src-tauri/gen/android/app/build/outputs/apk/**/*-signed.apk
          retention-days: 14

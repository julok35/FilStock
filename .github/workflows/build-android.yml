name: Build Android APK

on:
  push:
    branches: [native-app, "claude/mobile-app-conversion-plan-SYrf1"]
  workflow_dispatch: # déclenchement manuel depuis l'onglet Actions de GitHub

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      # Génère un icon.png 512×512 minimal (bleu FilStock) — requis par generate_context!()
      - name: Generate placeholder icons
        run: |
          mkdir -p src-tauri/icons
          python3 << 'EOF'
          import struct, zlib
          def make_png(size, r, g, b):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              raw = b''.join(b'\x00' + bytes([r, g, b]) * size for _ in range(size))
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend
          for name, sz in [('icon', 512), ('32x32', 32), ('128x128', 128), ('128x128@2x', 256)]:
              with open(f'src-tauri/icons/{name}.png', 'wb') as f:
                  f.write(make_png(sz, 0, 120, 200))
          EOF

      - name: Initialize Tauri Android project
        run: npx tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Build Android APK (debug)
        run: npx tauri android build --apk --debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: filstock-android-debug
          # chemin glob large — la structure exacte dépend des ABI buildées
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 14

name: Build Android APK

on:
  push:
    branches: [native-app, "claude/mobile-app-conversion-plan-SYrf1"]
  workflow_dispatch: # déclenchement manuel depuis l'onglet Actions de GitHub

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Vérification immédiate — confirme que les icônes sont dans le repo
      - name: Verify icons exist
        run: |
          echo "=== Contenu src-tauri/icons/ ==="
          ls -la src-tauri/icons/
          echo "=== Magic bytes icon.png ==="
          od -An -tx1 src-tauri/icons/icon.png | head -1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      # Cache désactivé — le cache Rust des runs précédents (build raté) peut corrompre l'état
      # Réactiver une fois que le premier build complet réussit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Initialize Tauri Android project
        run: npx tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Build Android APK (debug)
        run: npx tauri android build --apk --debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          CARGO_INCREMENTAL: "0"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: filstock-android-debug
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 14

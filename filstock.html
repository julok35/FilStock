<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilStock Julok</title>
<style>
  :root {
    --bg: #0d0d0f;
    --bg2: #141416;
    --bg3: #1c1c1f;
    --border: #2a2a2e;
    --text: #f0f0f2;
    --text2: #8a8a94;
    --accent: #ff5f1f;
    --accent2: #ff8c57;
    --danger: #ff3b3b;
    --warn: #ffb800;
    --ok: #00d084;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,.45);
    --btn-size: 36px;
    --btn-font: 16px;
    --btn-add-font: 13px;
    --btn-small-size: 28px;
    --btn-small-font: 13px;
    --pastille-card-font: 26px;
    --pastille-list-font: 13px;
    --app-font: 14px;
  }
  [data-theme="light"] {
    --bg: #f5f4f0; --bg2: #ffffff; --bg3: #eae9e5;
    --border: #d8d7d2; --text: #1a1a1e; --text2: #6a6a74;
    --shadow: 0 4px 24px rgba(0,0,0,.10);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
    font-size: var(--app-font); background: var(--bg); color: var(--text);
    min-height: 100vh; transition: background .25s, color .25s;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 20px; display: flex; align-items: center; gap: 12px;
    height: auto; min-height: 58px; flex-wrap: wrap;
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -.5px; flex: 1; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .logo span { color: var(--accent); }
  .logo-sub { font-size: 11px; color: var(--text2); font-weight: 400; }
  .version-badge {
    font-size: 10px; color: var(--text2);
    font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace;
    background: var(--bg3); padding: 2px 8px; border-radius: 20px;
    border: 1px solid var(--border); letter-spacing: .3px;
  }
  .last-modified-badge {
    font-size: 10px; color: var(--text2);
    font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace;
    background: var(--bg3); padding: 2px 9px; border-radius: 20px;
    border: 1px solid var(--border); letter-spacing: .3px;
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .last-modified-badge:hover { border-color: var(--accent); color: var(--accent); }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-icon {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; border-radius: 10px;
    width: var(--btn-size); height: var(--btn-size);
    display: flex; align-items: center; justify-content: center;
    font-size: var(--btn-font);
    transition: width .15s, height .15s, font-size .15s, background .15s, border-color .15s;
  }
  .btn-icon:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-add {
    background: var(--accent); border: none; color: #fff;
    font-family: inherit; font-weight: 700; font-size: var(--btn-add-font);
    padding: 0 16px; height: var(--btn-size); border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: background .15s, height .15s;
    white-space: nowrap;
  }
  .btn-add:hover { background: var(--accent2); }

  /* ── FILTERS BAR ── */
  .filters {
    padding: 12px 20px; background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .filter-chip {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace;
    font-size: 11px; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all .15s;
  }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-sep { width: 1px; height: 20px; background: var(--border); }
  .search-wrap { position: relative; margin-left: auto; }
  .search-wrap input {
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace;
    font-size: 12px; padding: 6px 12px 6px 32px; border-radius: 20px; outline: none; width: 160px;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before { content: '⌕'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 16px; pointer-events: none; }

  /* ── STATS BAR ── */
  .stats { padding: 10px 20px; display: flex; gap: 20px; flex-wrap: wrap; }
  .stat { font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 11px; color: var(--text2); }
  .stat strong { color: var(--text); font-family: inherit; font-size: 15px; font-weight: 700; }

  /* ── GRID / LIST ── */
  .view-container { padding: 0 20px 40px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }

  /* ── CARD ── */
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    cursor: pointer; transition: transform .15s, box-shadow .15s, border-color .15s;
    position: relative;
  }
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--accent); }
  .card.alert { border-color: var(--danger); }
  .card.alert::after {
    content: '⚠ PRESQUE VIDE'; position: absolute; top: 8px; right: 8px;
    background: var(--danger); color: #fff; font-size: 9px;
    font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace;
    font-weight: 500; padding: 3px 7px; border-radius: 6px; letter-spacing: .5px;
  }
  .spool-visual { height: 130px; display: flex; align-items: center; justify-content: center; background: var(--bg3); position: relative; overflow: hidden; }
  .pastille {
    width: 96px; height: 96px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,.35), inset 0 -3px 8px rgba(0,0,0,.25), inset 0 3px 8px rgba(255,255,255,.12);
    flex-shrink: 0;
  }
  .pastille-label { font-family: inherit; font-weight: 800; font-size: var(--pastille-card-font); letter-spacing: -.5px; text-align: center; line-height: 1.1; padding: 0 8px; text-shadow: 0 1px 4px rgba(0,0,0,.5); word-break: break-all; }
  .card-body { padding: 12px 14px; }
  .card-title { font-size: 14px; font-weight: 700; line-height: 1.2; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-code-badge {
    font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace;
    font-size: 10px; color: var(--accent); background: rgba(255,95,31,.12);
    padding: 2px 7px; border-radius: 5px; border: 1px solid rgba(255,95,31,.2);
    display: inline-block; margin-bottom: 6px; letter-spacing: .3px;
  }
  .card-sub { font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 11px; color: var(--text2); margin-bottom: 10px; }
  .qty-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .qty-fill { height: 100%; border-radius: 2px; transition: width .3s; }
  .qty-fill.hi { background: var(--ok); } .qty-fill.mid { background: var(--warn); } .qty-fill.lo { background: var(--danger); }
  .card-footer { display: flex; flex-direction: column; gap: 6px; font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 10px; color: var(--text2); }
  .card-footer-top { display: flex; justify-content: space-between; align-items: center; }
  .card-tags-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 4px 9px; border-radius: 7px; font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-weight: 600; letter-spacing: .2px; display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
  .tag-vacuum { background: #1e3a5f; color: #5aaeff; border: 1px solid #2a4f7a; }
  .tag-open   { background: #2e1a00; color: var(--warn); border: 1px solid #4a2e00; }
  .tag-inuse  { background: #0e2e1a; color: var(--ok); border: 1px solid #1a4a2a; }
  .tag-stock  { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .tag-refill { background: #2a1a2e; color: #c084ff; border: 1px solid #3d2450; }
  .tag-mounted { background: #0e2233; color: #60c8ff; border: 1px solid #1a3a50; }
  .card-actions { position: absolute; top: 8px; left: 8px; display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
  .card:hover .card-actions { opacity: 1; }
  .btn-small {
    background: rgba(13,13,15,.85); backdrop-filter: blur(4px);
    border: 1px solid var(--border); color: var(--text); border-radius: 7px;
    width: var(--btn-small-size); height: var(--btn-small-size);
    display: flex; align-items: center; justify-content: center;
    font-size: var(--btn-small-font); cursor: pointer; transition: all .12s;
  }
  .btn-small:hover { background: var(--accent); border-color: var(--accent); }

  /* ── SUPPORT BADGES ── */
  .support-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 6px;
    font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace;
    font-weight: 600; display: inline-flex; align-items: center; gap: 3px;
  }
  .support-badge-n   { background: #1e3a5f; color: #5aaeff; border: 1px solid #2a4f7a; }
  .support-badge-ht  { background: #2e1a00; color: var(--warn); border: 1px solid #4a2e00; }
  .support-badge-vht { background: #2e0404; color: #ff7070; border: 1px solid #4a1010; }

  /* ── TRAITS ── */
  .traits-grid { display: flex; flex-wrap: wrap; gap: 7px; }
  .trait-chip { background: var(--bg3); border: 1.5px solid var(--border); color: var(--text2); font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 11px; padding: 5px 11px; border-radius: 20px; cursor: pointer; transition: all .14s; user-select: none; display: flex; align-items: center; gap: 5px; }
  .trait-chip:hover { border-color: var(--accent); color: var(--text); }
  .trait-chip.on { border-color: var(--accent); background: rgba(255,95,31,.15); color: var(--accent); font-weight: 600; }
  .trait-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-weight: 600; border: 1px solid currentColor; opacity: .9; display: inline-flex; align-items: center; gap: 3px; }

  /* ── GROUPED CARDS (bobines redondantes) ── */
  .card-group { position: relative; isolation: isolate; }
  .card-ghost {
    position: absolute; inset: 0; pointer-events: none;
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  }
  .card-ghost-1 { transform: rotate(-1.5deg) translate(0px, 5px); z-index: 0; }
  .card-ghost-2 { transform: rotate(1.5deg) translate(3px, 9px); z-index: -1; }
  .card-group > .card { position: relative; z-index: 1; cursor: default; }
  .card-group > .card:hover { transform: none; border-color: var(--border); box-shadow: none; }
  .card-group:hover > .card { border-color: var(--accent); box-shadow: var(--shadow); }
  .card-group-badge {
    position: absolute; top: -5px; right: 4px; z-index: 10;
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 12px;
    font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace;
    letter-spacing: .4px; pointer-events: none;
  }
  .card-group-badge.alert { background: var(--danger); }
  .card-group-toggle-wrap { padding: 0 14px 12px; }
  .btn-group-toggle {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text2); font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace;
    font-size: 11px; padding: 6px 12px; border-radius: 8px;
    cursor: pointer; transition: all .12s; text-align: center;
  }
  .btn-group-toggle:hover { border-color: var(--accent); color: var(--accent); }
  /* Expanded group — full grid row */
  .card-group-expanded-wrapper { grid-column: 1 / -1; }
  .card-group-expanded-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 4px 10px; border-bottom: 1px solid var(--border); margin-bottom: 12px;
  }
  .card-group-expanded-header .btn-group-toggle { width: auto; }
  .card-group-sub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }

  /* ── LIST VIEW ── */
  .list { display: flex; flex-direction: column; gap: 6px; }
  .list-row {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px;
    display: grid; grid-template-columns: 48px 1fr auto auto auto;
    align-items: center; gap: 14px; cursor: pointer; transition: border-color .15s;
  }
  .list-row:hover { border-color: var(--accent); }
  .list-row.alert { border-color: var(--danger); }
  .list-dot { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; }
  .list-dot-label { font-size: var(--pastille-list-font); font-weight: 800; text-align: center; line-height: 1.1; padding: 0 3px; text-shadow: 0 1px 3px rgba(0,0,0,.5); word-break: break-all; }
  .list-info { min-width: 0; }
  .list-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-sub { font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
  .list-code { font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 10px; color: var(--accent); background: rgba(255,95,31,.12); padding: 1px 5px; border-radius: 4px; }
  .list-qty { font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 13px; text-align: right; white-space: nowrap; }
  .list-tags { display: flex; gap: 6px; justify-content: flex-end; align-items: center; }
  .list-actions { display: flex; gap: 4px; }
  .list-group-header {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 16px; display: flex; align-items: center; gap: 12px;
    font-size: 13px; font-weight: 700;
  }
  .list-group-header.alert { border-color: var(--danger); }
  .list-group-indent { padding-left: 22px; }

  /* ── TOOLTIP ── */
  .tip { position: relative; cursor: default; }
  .tip::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #18181c; color: var(--text); font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 11px; font-weight: 500; padding: 5px 10px; border-radius: 7px; border: 1px solid var(--border); white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 50; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
  .tip::before { content: ''; position: absolute; bottom: calc(100% + 2px); left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: var(--border); pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 50; }
  .tip:hover::after, .tip:hover::before { opacity: 1; }

  /* ── MODAL ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; transform: translateY(16px); transition: transform .2s; padding: 28px; }
  .overlay.open .modal { transform: translateY(0); }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 22px; }
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 11px; color: var(--text2); margin-bottom: 6px; letter-spacing: .5px; }
  .form-input, .form-select { width: 100%; background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 14px; padding: 10px 14px; border-radius: 10px; outline: none; transition: border-color .15s; -webkit-appearance: none; }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .color-swatch { width: 30px; height: 30px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all .12s; flex-shrink: 0; }
  .color-swatch.selected { border-color: var(--text); transform: scale(1.15); }
  #customColorInput { width: 36px; height: 30px; border: none; background: none; cursor: pointer; padding: 0; }
  .qty-slider-wrap { display: flex; align-items: center; gap: 12px; }
  input[type=range] { flex: 1; -webkit-appearance: none; height: 4px; background: var(--bg3); border-radius: 2px; outline: none; accent-color: var(--accent); }
  .qty-display { font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 13px; color: var(--accent); min-width: 80px; text-align: right; }
  .form-toggle-row { display: flex; gap: 8px; }
  .form-toggle { flex: 1; background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 11px; padding: 8px; border-radius: 8px; cursor: pointer; text-align: center; transition: all .12s; }
  .form-toggle.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .modal-footer { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .btn-cancel { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-weight: 600; font-size: 13px; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: all .12s; }
  .btn-save { background: var(--accent); border: none; color: #fff; font-family: inherit; font-weight: 700; font-size: 13px; padding: 10px 24px; border-radius: 10px; cursor: pointer; transition: all .12s; }
  .btn-save:hover { background: var(--accent2); }
  .btn-delete { background: transparent; border: 1px solid var(--danger); color: var(--danger); font-family: inherit; font-weight: 600; font-size: 13px; padding: 10px 16px; border-radius: 10px; cursor: pointer; transition: all .12s; margin-right: auto; }
  .btn-delete:hover { background: var(--danger); color: #fff; }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 80px 20px; color: var(--text2); }
  .empty-icon { font-size: 52px; margin-bottom: 16px; opacity: .4; }
  .empty h3 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .empty p { font-size: 13px; line-height: 1.6; }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 12px; padding: 10px 20px; border-radius: 30px; z-index: 300; transition: transform .3s; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── SETTINGS / JOURNAL PANELS ── */
  .settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(4px); z-index: 200; display: flex; justify-content: flex-end; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .settings-overlay.open { opacity: 1; pointer-events: all; }
  .settings-panel { background: var(--bg2); border-left: 1px solid var(--border); width: 100%; max-width: 400px; height: 100%; overflow-y: auto; transform: translateX(40px); transition: transform .22s; display: flex; flex-direction: column; }
  .settings-overlay.open .settings-panel { transform: translateX(0); }
  .settings-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg2); z-index: 10; }
  .settings-title { font-size: 18px; font-weight: 800; }
  .settings-close { background: var(--bg3); border: 1px solid var(--border); color: var(--text); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .12s; }
  .settings-close:hover { background: var(--danger); border-color: var(--danger); color: #fff; }
  .settings-body { padding: 20px 24px; flex: 1; display: flex; flex-direction: column; gap: 28px; }
  .settings-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--text2); text-transform: uppercase; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .settings-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .settings-row label { flex: 1; font-size: 13px; font-weight: 600; }

  .custom-item-del:disabled { opacity: .3; cursor: not-allowed; }
  .custom-item-del:disabled:hover { color: var(--text2); background: none; }
  .add-row { display: flex; gap: 8px; align-items: center; }
  .add-row input[type=text], .add-row input[type=color] { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 12px; border-radius: 8px; outline: none; flex: 1; transition: border-color .15s; }
  .add-row input[type=text]:focus { border-color: var(--accent); }
  .add-row input[type=color] { width: 40px; height: 36px; padding: 2px; cursor: pointer; flex: none; }
  .add-row select { background: var(--bg3); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 12px; border-radius: 8px; outline: none; flex: 1; transition: border-color .15s; -webkit-appearance: none; cursor: pointer; }
  .add-row select:focus { border-color: var(--accent); }
  .btn-add-small { background: var(--accent); border: none; color: #fff; font-family: inherit; font-weight: 700; font-size: 13px; padding: 0 14px; height: 36px; border-radius: 8px; cursor: pointer; white-space: nowrap; transition: all .12s; flex-shrink: 0; }
  .btn-add-small:hover { background: var(--accent2); }

  /* ── JOURNAL ── */
  .journal-tabs { display: flex; gap: 6px; padding: 12px 24px 0; flex-wrap: wrap; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  .journal-tab { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all .12s; }
  .journal-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .journal-tab-clear { margin-left: auto; background: none; border: 1px solid var(--danger); color: var(--danger); font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-size: 11px; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all .12s; }
  .journal-tab-clear:hover { background: var(--danger); color: #fff; }
  .journal-entry { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12px; }
  .journal-entry-header { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 4px; }
  .journal-action-icon { font-size: 13px; flex-shrink: 0; }
  .journal-code { font-family: ui-monospace, 'SF Mono', 'Cascadia Mono', 'Segoe UI Mono', monospace; font-weight: 700; color: var(--accent); font-size: 11px; }
  .journal-label { color: var(--text); font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

<script>
// ─── VERSION ─────────────────────────────────────────────────────────
const APP_VERSION = '1.2';

// ─── UTILITAIRE : ÉCHAPPEMENT HTML ───────────────────────────────────
function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─── UTILITAIRE : COULEUR DE TEXTE ───────────────────────────────────
function getTextColor(hex) {
  const h = hex.replace('#','');
  const r = parseInt(h.slice(0,2),16), g = parseInt(h.slice(2,4),16), b = parseInt(h.slice(4,6),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255 > 0.55 ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,0.92)';
}

// ─── CONSTANTES ───────────────────────────────────────────────────────
const BASE_COLORS = [
  {name:'Noir',hex:'#1a1a1a'},{name:'Blanc',hex:'#f0eeea'},{name:'Gris',hex:'#7a7a82'},
  {name:'Rouge',hex:'#e83030'},{name:'Orange',hex:'#ff6d1f'},{name:'Jaune',hex:'#ffd600'},
  {name:'Vert',hex:'#1db954'},{name:'Bleu',hex:'#1a78e8'},{name:'Violet',hex:'#8844ee'},
  {name:'Rose',hex:'#ff4dad'},{name:'Marron',hex:'#8b5e3c'},{name:'Transparent',hex:'#c8d8e8'},
];
const BASE_MATERIALS = ['PLA','PETG','ABS','ASA','TPU','NYLON','PA-CF','PLA-CF','PETG-CF','Autre'];
const TRAITS = [
  {id:'flexible',label:'Souple',icon:'🫀',color:'#22c55e'},
  {id:'transparent',label:'Transparent',icon:'💎',color:'#7dd3fc'},
  {id:'glossy',label:'Brillant',icon:'✨',color:'#fbbf24'},
  {id:'matte',label:'Mat',icon:'🪨',color:'#94a3b8'},
  {id:'wood',label:'Bois',icon:'🪵',color:'#a16207'},
  {id:'stone',label:'Pierre',icon:'🪨',color:'#78716c'},
  {id:'carbon',label:'Carbone',icon:'⬛',color:'#1e293b'},
  {id:'fiberglass',label:'Fibre de verre',icon:'🔷',color:'#38bdf8'},
  {id:'antistatic',label:'Antistatique',icon:'⚡',color:'#f59e0b'},
  {id:'fireproof',label:'Anti-feu',icon:'🔥',color:'#ef4444'},
];
const FIELD_LABELS = {
  brand:'Marque', material:'Matière', qty:'Quantité', pack:'Emballage',
  loc:'Emplacement', type:'Type', colorName:'Couleur', color:'Couleur hex',
  notes:'Notes', supportId:'Support', traits:'Caractéristiques'
};
const SPOOL_DIFF_FIELDS = ['brand','material','qty','pack','loc','type','color','colorName','notes','supportId','traits'];

// ─── ÉTAT GLOBAL ──────────────────────────────────────────────────────
let customColors    = JSON.parse(localStorage.getItem('filstock_custom_colors')    || '[]');
let customMaterials = JSON.parse(localStorage.getItem('filstock_custom_materials') || '[]');
let supports        = JSON.parse(localStorage.getItem('filstock_supports')         || '[]');
let codeCounters    = JSON.parse(localStorage.getItem('filstock_code_counters')    || '{}');
let spools          = JSON.parse(localStorage.getItem('filstock_v1')               || '[]');
let selectedTraits  = new Set();
let currentFilter   = 'all';
let currentView     = 'card';
let searchQ         = '';
let selectedColor   = '';
let editingId       = null;
let expandedGroups  = new Set();
let currentJournalFilter = 'all';

// ─── PERSISTANCE ──────────────────────────────────────────────────────
function save()         { localStorage.setItem('filstock_v1', JSON.stringify(spools)); }
function saveSettings() { localStorage.setItem('filstock_custom_colors', JSON.stringify(customColors)); localStorage.setItem('filstock_custom_materials', JSON.stringify(customMaterials)); }
function saveSupports() { localStorage.setItem('filstock_supports', JSON.stringify(supports)); }

function getAllColors()    { return [...BASE_COLORS, ...customColors]; }
function getAllMaterials() { return [...BASE_MATERIALS, ...customMaterials]; }
function uid()            { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function qtyToGrams(pct)  { return Math.round(pct * 10); }
function qtyClass(pct)    { return pct <= 20 ? 'lo' : pct <= 50 ? 'mid' : 'hi'; }

// ─── CODIFICATION UNIQUE ──────────────────────────────────────────────
function generateSpoolCode(material, colorName) {
  const matPart   = material.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9]/g,'').slice(0,8);
  const colorPart = colorName.toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z0-9]/g,'').slice(0,5) || 'PERSO';
  const base = `${matPart}-${colorPart}`;
  codeCounters[base] = (codeCounters[base] || 0) + 1;
  localStorage.setItem('filstock_code_counters', JSON.stringify(codeCounters));
  return `${base}-${String(codeCounters[base]).padStart(3,'0')}`;
}

function syncCodeCounters() {
  // Initialise les compteurs depuis les codes existants (évite les collisions à l'import)
  spools.forEach(s => {
    if (!s.code) return;
    const parts = s.code.split('-');
    const num = parseInt(parts[parts.length - 1]);
    if (isNaN(num)) return;
    const base = parts.slice(0, -1).join('-');
    codeCounters[base] = Math.max(codeCounters[base] || 0, num);
  });
  localStorage.setItem('filstock_code_counters', JSON.stringify(codeCounters));
}

function migrateSpoolCodes() {
  let changed = false;
  spools.forEach(s => {
    if (!s.code) { s.code = generateSpoolCode(s.material, s.colorName); changed = true; }
    if (!s.createdAt)    { s.createdAt    = new Date().toISOString(); changed = true; }
    if (!s.lastModified) { s.lastModified = new Date().toISOString(); changed = true; }
    if (s.supportId === undefined) { s.supportId = null; changed = true; }
  });
  if (changed) save();
}

// ─── SUPPORTS ─────────────────────────────────────────────────────────
function supportTypeIcon(type) {
  return type === 'normal' ? '🔩' : type === 'high-temp' ? '🌡️' : '🔥';
}
function supportTypeCls(type) {
  return type === 'normal' ? 'n' : type === 'high-temp' ? 'ht' : 'vht';
}
function generateSupportId(type) {
  const prefix = {normal:'SUP-N','high-temp':'SUP-HT','very-high-temp':'SUP-THT'}[type] || 'SUP-N';
  const max = Math.max(0, ...supports.filter(s => s.type === type).map(s => +(s.id.split('-').pop()) || 0));
  return `${prefix}-${String(max + 1).padStart(2,'0')}`;
}
function supportBadgeHTML(supportId) {
  if (!supportId) return '';
  const sup = supports.find(s => s.id === supportId);
  if (!sup) return `<span class="support-badge support-badge-n">${esc(supportId)}</span>`;
  return `<span class="support-badge support-badge-${supportTypeCls(sup.type)}">${supportTypeIcon(sup.type)} ${esc(supportId)}</span>`;
}

// ─── JOURNAL ──────────────────────────────────────────────────────────
function addJournalEntry(entry) {
  let j = JSON.parse(localStorage.getItem('filstock_journal') || '[]');
  j.unshift(entry);
  if (j.length > 200) j = j.slice(0, 200);
  localStorage.setItem('filstock_journal', JSON.stringify(j));
  localStorage.setItem('filstock_last_modified', entry.ts);
  updateLastModifiedBadge();
}

function updateLastModifiedBadge() {
  const badge = document.getElementById('lastModifiedBadge');
  const s = localStorage.getItem('filstock_last_modified');
  if (!s) { badge.style.display = 'none'; return; }
  const d = new Date(s);
  const dd = String(d.getDate()).padStart(2,'0'), mm = String(d.getMonth()+1).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0'), mn = String(d.getMinutes()).padStart(2,'0');
  badge.textContent = `🕐 ${dd}/${mm} ${hh}:${mn}`;
  badge.style.display = '';
}

function timeAgo(iso) {
  const m = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
  if (m < 1) return 'à l\'instant';
  if (m < 60) return `il y a ${m} min`;
  const h = Math.floor(m / 60);
  if (h < 24) return `il y a ${h}h`;
  const d = Math.floor(h / 24);
  if (d < 30) return `il y a ${d}j`;
  return new Date(iso).toLocaleDateString('fr-FR');
}

function diffEntity(oldObj, newObj, fields) {
  return fields.filter(f => JSON.stringify(oldObj[f]) !== JSON.stringify(newObj[f]))
               .map(f => ({ field: f, from: oldObj[f], to: newObj[f] }));
}

function formatFieldValue(field, value) {
  if (value === null || value === undefined || value === '') return 'aucun';
  if (field === 'qty')  return `${qtyToGrams(value)}g (${value}%)`;
  if (field === 'pack') return value === 'vacuum' ? 'sous vide' : 'ouvert';
  if (field === 'loc')  return value === 'inuse'  ? 'en machine' : 'en stock';
  if (field === 'type') return value === 'mounted'? 'sur support' : 'recharge';
  if (field === 'traits') return Array.isArray(value) ? (value.length ? value.join(', ') : 'aucun') : String(value);
  if (field === 'color') return String(value); // hex
  return String(value);
}

function changesHTML(changes) {
  if (!changes || !changes.length) return '';
  // Merge color + colorName into single "Couleur" entry
  const hasColorName = changes.find(c => c.field === 'colorName');
  const hasHex = changes.find(c => c.field === 'color');
  const others = changes.filter(c => c.field !== 'color' && c.field !== 'colorName');
  const display = [...others];
  if (hasColorName) display.push({field:'colorName', from: hasColorName.from, to: hasColorName.to});
  else if (hasHex) display.push({field:'color', from: hasHex.from, to: hasHex.to});
  return display.map(c => {
    const lbl = FIELD_LABELS[c.field] || c.field;
    return `<div><span style="color:var(--text2)">${esc(lbl)} :</span> <span class="j-from">${esc(formatFieldValue(c.field,c.from))}</span> → <span class="j-to">${esc(formatFieldValue(c.field,c.to))}</span></div>`;
  }).join('');
}

  'created':'✦','edited':'✎','deleted':'🗑',
  'support_created':'✦','support_edited':'✎','support_deleted':'🗑','support_assigned':'🔗'
};
const ACTION_LABELS = {
  'created':'Créée','edited':'Modifiée','deleted':'Supprimée',
  'support_created':'Créé','support_edited':'Modifié','support_deleted':'Supprimé','support_assigned':'Réassigné'
};

// ─── RENDU STATS ──────────────────────────────────────────────────────
function getFiltered() {
  return spools.filter(s => {
    if (currentFilter === 'open')   return s.pack === 'open';
    if (currentFilter === 'vacuum') return s.pack === 'vacuum';
    if (currentFilter === 'inuse')  return s.loc  === 'inuse';
    if (currentFilter === 'stock')  return s.loc  === 'stock';
    if (currentFilter === 'alert')  return s.qty  <= 20;
    return true;
  }).filter(s => {
    if (!searchQ) return true;
    const q = searchQ.toLowerCase();
    return (s.brand + s.material + s.colorName + (s.notes || '') + (s.code || '')).toLowerCase().includes(q);
  });
}

function renderStats() {
  const el = document.getElementById('statsBar');
  const total    = spools.length;
  const alerts   = spools.filter(s => s.qty <= 20).length;
  const inuse    = spools.filter(s => s.loc === 'inuse').length;
  const filtered = getFiltered().length;
  const freeSup  = supports.length - spools.filter(s => s.supportId).length;
  el.innerHTML = `
    <div class="stat"><strong>${filtered}</strong><br>affichées</div>
    <div class="stat"><strong>${total}</strong><br>total</div>
    <div class="stat"><strong>${inuse}</strong><br>en machine</div>
    ${supports.length ? `<div class="stat"><strong>${freeSup}</strong><br>supports libres</div>` : ''}
    ${alerts ? `<div class="stat" style="color:var(--danger)"><strong>${alerts}</strong><br>⚠ presque vides</div>` : ''}
  `;
}

// ─── RENDU CARTE ──────────────────────────────────────────────────────

// ─── RENDU GROUPE CARTE (bobines redondantes) ─────────────────────────
function getSpoolGroups(items) {
  const map = new Map();
  for (const s of items) {
    const key = `${s.material}::${s.colorName}`;
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(s);
  }
  return map;
}

function getPrimarySpoolFromGroup(spools) {
  const inuse = spools.filter(s => s.loc === 'inuse');
  if (inuse.length) return inuse.reduce((a,b) => a.qty <= b.qty ? a : b);
  const open = spools.filter(s => s.pack === 'open');
  if (open.length) return open.reduce((a,b) => a.qty <= b.qty ? a : b);
  return spools.reduce((a,b) => a.qty <= b.qty ? a : b);
}

function renderCardGroup(key, groupSpools) {
  const primary    = getPrimarySpoolFromGroup(groupSpools);
  const hasAlert   = groupSpools.some(s => s.qty <= 20);
  const n          = groupSpools.length;
  const totalGrams = groupSpools.reduce((acc,s) => acc + qtyToGrams(s.qty), 0);
  const compositePct = Math.min(100, Math.round(totalGrams / (n * 1000) * 100));
  const qCls   = qtyClass(compositePct);
  const qColor = qCls==='lo'?'var(--danger)':qCls==='mid'?'var(--warn)':'var(--ok)';
  const inuseCount = groupSpools.filter(s => s.loc === 'inuse').length;
  const stockCount = groupSpools.filter(s => s.loc === 'stock').length;
  const statusParts = [];
  if (inuseCount) statusParts.push(`${inuseCount} en machine`);
  if (stockCount) statusParts.push(`${stockCount} en stock`);
  const brands    = [...new Set(groupSpools.map(s => s.brand))];
  const brandStr  = brands.length === 1 ? brands[0] : `${brands.length} marques`;
  const [material, colorName] = key.split('::');
  return `<div class="card-group">
    <div class="card-ghost card-ghost-2"></div>
    <div class="card-ghost card-ghost-1"></div>
    <span class="card-group-badge${hasAlert?' alert':''}">&times;${n}</span>
    <div class="card${hasAlert?' alert':''}">
      <div class="spool-visual">${pastilleHTML(primary.color, material)}</div>
      <div class="card-body">
        <div class="card-title">${esc(brandStr)} · ${esc(colorName)}</div>
        <div class="card-sub">${esc(material)}</div>
        <div class="qty-bar"><div class="qty-fill ${qCls}" style="width:${compositePct}%"></div></div>
        <div class="card-footer">
          <div class="card-footer-top">
            <span style="font-size:13px;font-family:ui-monospace,'SF Mono','Cascadia Mono','Segoe UI Mono',monospace;font-weight:700;color:${qColor}">${totalGrams}g total · ${compositePct}%</span>
          </div>
          <div style="font-family:ui-monospace,'SF Mono','Cascadia Mono','Segoe UI Mono',monospace;font-size:11px;color:var(--text2)">${statusParts.join(' · ')}</div>
        </div>
      </div>
      <div class="card-group-toggle-wrap">
        <button class="btn-group-toggle" data-group-key="${esc(key)}">▼ Voir les ${n} bobines</button>
      </div>
    </div>
  </div>`;
}

function renderCardGroupExpanded(key, groupSpools) {
  const [material, colorName] = key.split('::');
  const hasAlert   = groupSpools.some(s => s.qty <= 20);
  const totalGrams = groupSpools.reduce((acc,s) => acc + qtyToGrams(s.qty), 0);
  const n = groupSpools.length;
  return `<div class="card-group-expanded-wrapper">
    <div class="card-group-expanded-header">
      <span style="font-size:14px;font-weight:700">
        ${esc(material)} · ${esc(colorName)}
        <span style="font-size:12px;color:var(--text2);font-family:ui-monospace,'SF Mono','Cascadia Mono','Segoe UI Mono',monospace;margin-left:8px">${n} bobines · ${totalGrams}g total</span>
        ${hasAlert?'<span style="font-size:11px;color:var(--danger);margin-left:6px">⚠ alerte stock</span>':''}
      </span>
      <button class="btn-group-toggle" style="width:auto" data-group-key="${esc(key)}">▲ Réduire</button>
    </div>
    <div class="card-group-sub-grid">${groupSpools.map(s => renderCard(s)).join('')}</div>
  </div>`;
}

function toggleGroup(key) {
  if (expandedGroups.has(key)) expandedGroups.delete(key);
  else expandedGroups.add(key);
  render();
}

// ─── RENDU LISTE ROW ──────────────────────────────────────────────────

function renderListGroup(key, groupSpools) {
  const [material, colorName] = key.split('::');
  const primary    = getPrimarySpoolFromGroup(groupSpools);
  const hasAlert   = groupSpools.some(s => s.qty <= 20);
  const totalGrams = groupSpools.reduce((acc,s) => acc + qtyToGrams(s.qty), 0);
  const header = `<div class="list-group-header${hasAlert?' alert':''}">
    <div class="list-dot" style="background:${primary.color};border:2px solid rgba(255,255,255,.15)">
      <span class="list-dot-label" style="color:${getTextColor(primary.color)}">${esc(material.slice(0,4))}</span>
    </div>
    <div><div style="font-size:13px;font-weight:700">${esc(material)} · ${esc(colorName)}</div>
    <div style="font-size:11px;color:var(--text2);font-family:ui-monospace,'SF Mono','Cascadia Mono','Segoe UI Mono',monospace;margin-top:2px">${groupSpools.length} bobines · ${totalGrams}g total</div></div>
  </div>`;
  const rows = groupSpools.map(s => `<div class="list-group-indent">${renderListRow(s)}</div>`).join('');
  return header + rows;
}

// ─── RENDU PRINCIPAL ──────────────────────────────────────────────────
function render() {
  renderStats();
  const items = getFiltered();
  const container = document.getElementById('viewContainer');
  if (!items.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🧵</div><h3>Aucune bobine</h3><p>Ajoutez votre première bobine<br>en cliquant sur "+ Bobine".</p></div>`;
    return;
  }
  const groups = getSpoolGroups(items);
  if (currentView === 'card') {
    let html = '<div class="grid">';
    for (const [key, gs] of groups) {
      if (gs.length < 2)             html += renderCard(gs[0]);
      else if (expandedGroups.has(key)) html += renderCardGroupExpanded(key, gs);
      else                           html += renderCardGroup(key, gs);
    }
    html += '</div>';
    container.innerHTML = html;
  } else {
    let html = '<div class="list">';
    for (const [key, gs] of groups) {
      html += gs.length < 2 ? renderListRow(gs[0]) : renderListGroup(key, gs);
    }
    html += '</div>';
    container.innerHTML = html;
  }
}

// ─── COLOR PICKER ─────────────────────────────────────────────────────
function buildColorRow(activeHex) {
  const row = document.getElementById('colorRow');
  row.innerHTML = getAllColors().map(c =>
    `<div class="color-swatch${c.hex===activeHex?' selected':''}" style="background:${c.hex}" title="${esc(c.name)}" data-hex="${c.hex}"></div>`
  ).join('') + `<input type="color" id="customColorInput" value="${activeHex}" title="Couleur personnalisée">`;
  row.querySelectorAll('.color-swatch').forEach(el => el.addEventListener('click', () => selectColor(el.dataset.hex, el)));
  document.getElementById('customColorInput').addEventListener('input', function() { selectColorCustom(this.value); });
}
function buildTraitsGrid(activeSet) {
  selectedTraits = new Set(activeSet || []);
  document.getElementById('traitsGrid').innerHTML = TRAITS.map(t =>
    `<div class="trait-chip${selectedTraits.has(t.id)?' on':''}" data-trait="${t.id}" onclick="toggleTrait('${t.id}',this)"
      style="${selectedTraits.has(t.id)?`border-color:${t.color};color:${t.color};background:${t.color}22`:''}">
      ${t.icon} ${t.label}
    </div>`
  ).join('');
}
function toggleTrait(id, el) {
  const t = TRAITS.find(x => x.id === id);
  if (selectedTraits.has(id)) { selectedTraits.delete(id); el.classList.remove('on'); el.style.borderColor = el.style.color = el.style.background = ''; }
  else { selectedTraits.add(id); el.classList.add('on'); el.style.borderColor = el.style.color = t.color; el.style.background = t.color+'22'; }
}
function traitsHTML(traits) {
  if (!traits||!traits.length) return '';
  return traits.map(id => { const t = TRAITS.find(x=>x.id===id); return t ? `<span class="trait-badge" style="color:${t.color}">${t.icon} ${t.label}</span>` : ''; }).join('');
}
function selectColor(hex, el) { selectedColor = hex; document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected')); el.classList.add('selected'); }
function selectColorCustom(hex) { selectedColor = hex; document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected')); }

// ─── MODAL BOBINE ─────────────────────────────────────────────────────
function updateQtyDisplay(v) { document.getElementById('qtyDisplay').textContent = `${qtyToGrams(+v)}g · ${v}%`; }
function getToggle(group) { const a = document.querySelector(`.form-toggle.active[data-group="${group}"]`); return a ? a.dataset.val : null; }
function setToggle(group, val) { document.querySelectorAll(`.form-toggle[data-group="${group}"]`).forEach(b => b.classList.toggle('active', b.dataset.val === val)); }

function buildSupportSelect(currentSupportId) {
  const sel = document.getElementById('fSupport');
  if (!sel) return;
  let html = '<option value="">— Aucun support —</option>';
  supports.forEach(sup => {
    const otherHolder = spools.find(s => s.supportId === sup.id && s.id !== editingId);
    const icon = supportTypeIcon(sup.type);
    const noteStr = sup.notes ? ` · ${sup.notes}` : '';
    const isSelected = sup.id === currentSupportId;
    if (otherHolder) {
      const ref = otherHolder.code || otherHolder.brand;
      html += `<option value="${sup.id}" disabled style="color:var(--text2)">${esc(icon+' '+sup.id+noteStr)} → ${esc(ref)}</option>`;
    } else {
      html += `<option value="${sup.id}"${isSelected?' selected':''}>${esc(icon+' '+sup.id+noteStr)}</option>`;
    }
  });
  sel.innerHTML = html;
  if (currentSupportId && !spools.find(s => s.supportId === currentSupportId && s.id !== editingId)) sel.value = currentSupportId;
}

function openAdd() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nouvelle bobine';
  document.getElementById('editId').value = '';
  document.getElementById('fBrand').value = 'Bambu';

function openEdit(id) {
  const s = spools.find(x => x.id === id); if (!s) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = `Modifier · ${s.code || 'bobine'}`;
  document.getElementById('editId').value = id;
  document.getElementById('fBrand').value = s.brand;
  buildMaterialSelect(s.material);
  document.getElementById('fQty').value = s.qty;
  document.getElementById('fNotes').value = s.notes || '';
  updateQtyDisplay(s.qty);
  setToggle('pack', s.pack); setToggle('loc', s.loc); setToggle('type', s.type);
  selectedColor = s.color;
  buildColorRow(selectedColor); buildTraitsGrid(s.traits||[]); buildSupportSelect(s.supportId||null);
  document.getElementById('deleteBtn').style.display = 'inline-flex';
  document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function saveSpool() {
  const now      = new Date().toISOString();
  const brand    = document.getElementById('fBrand').value.trim() || 'Bambu';
  const material = document.getElementById('fMaterial').value;
  const qty      = +document.getElementById('fQty').value;
  const pack     = getToggle('pack') || 'vacuum';
  const loc      = getToggle('loc')  || 'stock';
  const type     = getToggle('type') || 'mounted';
  const notes    = document.getElementById('fNotes').value.trim();
  const traits   = [...selectedTraits];
  const newSupportId = document.getElementById('fSupport').value || null;
  const colorObj = getAllColors().find(c => c.hex === selectedColor);
  const colorName = colorObj ? colorObj.name : 'Personnalisée';

  if (editingId) {
    const idx = spools.findIndex(s => s.id === editingId);
    const oldSnap = {...spools[idx]};
    // Désassignation de l'ancien propriétaire si le support est réattribué
    if (newSupportId) {
      const prevHolder = spools.find(s => s.supportId === newSupportId && s.id !== editingId);
      if (prevHolder) { prevHolder.supportId = null; prevHolder.lastModified = now; }
    }
    spools[idx] = { ...spools[idx], brand, material, qty, pack, loc, type, notes, traits, color: selectedColor, colorName, supportId: newSupportId, lastModified: now };
    const changes = diffEntity(oldSnap, spools[idx], SPOOL_DIFF_FIELDS);
    if (changes.length) {
      addJournalEntry({ ts: now, action:'edited', entityType:'spool', entityId: editingId, entityCode: spools[idx].code || editingId, entityLabel: `${brand} ${material} ${colorName}`, changes });
    }
  } else {
    // Désassignation de l'ancien propriétaire si besoin
    if (newSupportId) {
      const prevHolder = spools.find(s => s.supportId === newSupportId);
      if (prevHolder) { prevHolder.supportId = null; prevHolder.lastModified = now; }
    }
    const code = generateSpoolCode(material, colorName);
    spools.push({ id: uid(), brand, material, qty, pack, loc, type, notes, traits, color: selectedColor, colorName, supportId: newSupportId, code, createdAt: now, lastModified: now });
    addJournalEntry({ ts: now, action:'created', entityType:'spool', entityId: spools[spools.length-1].id, entityCode: code, entityLabel: `${brand} ${material} ${colorName}`, changes: [] });
  }
  save(); closeModal(); render();
  showToast(editingId ? '✓ Bobine mise à jour' : '✓ Bobine ajoutée');
}

function deleteSpool() {
  if (!confirm('Supprimer cette bobine ?')) return;
  const s = spools.find(x => x.id === editingId);
  if (s) addJournalEntry({ ts: new Date().toISOString(), action:'deleted', entityType:'spool', entityId: s.id, entityCode: s.code||s.id, entityLabel: `${s.brand} ${s.material} ${s.colorName}`, changes:[] });
  spools = spools.filter(s => s.id !== editingId);
  save(); closeModal(); render();
  showToast('🗑 Bobine supprimée');
}

function showToast(msg) {

// ─── EXPORT / IMPORT ──────────────────────────────────────────────────
function exportJSON() {
  const data = { app:'FilStock Julok', version:1, appVersion:APP_VERSION, exportedAt: new Date().toISOString(), spools, supports };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `filstock-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('✓ Export téléchargé');
}

function normalizeImportedSpool(s) {
  return {
    id:          s.id          || uid(),
    brand:       s.brand       || 'Inconnu',
    material:    s.material    || 'PLA',
    colorName:   s.colorName   || 'Personnalisée',
    color:       (s.color && /^#[0-9a-fA-F]{6}$/.test(s.color)) ? s.color : '#7a7a82',
    qty:         (typeof s.qty==='number' && s.qty>=0 && s.qty<=100) ? Math.round(s.qty) : 100,
    pack:        ['vacuum','open'].includes(s.pack)    ? s.pack  : 'vacuum',
    loc:         ['stock','inuse'].includes(s.loc)     ? s.loc   : 'stock',
    type:        ['mounted','refill'].includes(s.type) ? s.type  : 'mounted',
    notes:       s.notes       || '',
    traits:      Array.isArray(s.traits) ? s.traits.filter(t => TRAITS.some(x=>x.id===t)) : [],
    code:        s.code        || null,
    supportId:   s.supportId   || null,
    createdAt:   s.createdAt   || new Date().toISOString(),
    lastModified:s.lastModified|| new Date().toISOString(),
  };
}
function normalizeImportedSupport(s) {
  return {
    id:    s.id    || generateSupportId(s.type||'normal'),
    type:  ['normal','high-temp','very-high-temp'].includes(s.type) ? s.type : 'normal',
    notes: s.notes || ''
  };
}

function importJSON(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const importedSpools   = Array.isArray(data) ? data : (Array.isArray(data.spools)   ? data.spools   : null);
      const importedSupports = Array.isArray(data.supports) ? data.supports : [];
      if (!importedSpools) throw new Error('Format invalide');
      const validSpools   = importedSpools.filter(s => s&&s.id&&s.material).map(normalizeImportedSpool);
      const validSupports = importedSupports.map(normalizeImportedSupport);
      if (!validSpools.length) throw new Error('Aucune bobine valide trouvée');
      const action = spools.length ? confirm(`Fusionner avec vos ${spools.length} bobine(s) existante(s) ?\n\nOK = fusionner (les doublons sont ignorés)\nAnnuler = remplacer tout`) : false;
      if (action) {
        const existingIds = new Set(spools.map(s => s.id));
        const newOnes = validSpools.filter(s => !existingIds.has(s.id));
        spools = [...spools, ...newOnes];
        const existingSupIds = new Set(supports.map(s => s.id));
        supports = [...supports, ...validSupports.filter(s => !existingSupIds.has(s.id))];
        showToast(`✓ ${newOnes.length} bobine(s) importée(s) par fusion`);
      } else {
        spools = validSpools; supports = validSupports;
        showToast(`✓ ${validSpools.length} bobine(s) importée(s)`);
      }
      syncCodeCounters(); migrateSpoolCodes();
      saveSupports(); save(); render();
    } catch(err) { alert('❌ Erreur d\'import : ' + err.message); }
  };
  reader.readAsText(file);
}

function renderJournal() {
  const container = document.getElementById('journalEntries');
  let j = JSON.parse(localStorage.getItem('filstock_journal') || '[]');
  if (currentJournalFilter === 'spool')   j = j.filter(e => e.entityType === 'spool');
  if (currentJournalFilter === 'support') j = j.filter(e => e.entityType === 'support');
  if (!j.length) { container.innerHTML = `<div class="journal-empty">📋 Aucune entrée dans le journal.</div>`; return; }
  container.innerHTML = j.map(entry => {
    const icon  = ACTION_ICONS[entry.action]  || '·';
    const label = ACTION_LABELS[entry.action] || entry.action;
    const changes = changesHTML(entry.changes || []);
    return `<div class="journal-entry">
      <div class="journal-entry-header">
        <span class="journal-action-icon">${icon}</span>
        <span class="journal-code">${esc(entry.entityCode||'')}</span>
        <span class="journal-label">${esc(entry.entityLabel||'')} — ${esc(label)}</span>
        <span class="journal-time">${timeAgo(entry.ts)}</span>
      </div>
      ${changes ? `<div class="journal-changes">${changes}</div>` : ''}
    </div>`;
  }).join('');
}

function renderSupportList() {
  const el = document.getElementById('supportList'); if (!el) return;
  if (!supports.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text2)">Aucun support créé.</div>'; return; }
  el.innerHTML = supports.map((sup, i) => {
    const holder = spools.find(s => s.supportId === sup.id);
    const holderStr = holder ? `<span class="custom-item-sub">→ ${esc(holder.code || holder.brand)}</span>` : '';
    const noteStr = sup.notes ? `<span class="custom-item-sub"> · ${esc(sup.notes)}</span>` : '';
    const icon = supportTypeIcon(sup.type);
    const cls  = supportTypeCls(sup.type);
    const canDel = !holder;
    return `<div class="custom-item">
      <span class="support-badge support-badge-${cls}" style="flex-shrink:0">${icon}</span>
      <span class="custom-item-label">${esc(sup.id)}${noteStr}${holderStr}</span>
      <button class="custom-item-del" onclick="deleteSupport('${sup.id}')" title="${canDel?'Supprimer':'Encore assigné'}" ${canDel?'':' disabled'}>✕</button>
    </div>`;
  }).join('');
}

function addSupport() {
  const type  = document.getElementById('newSupportType').value;
  const notes = document.getElementById('newSupportNotes').value.trim();
  const id = generateSupportId(type);
  const sup = {id, type, notes};
  supports.push(sup); saveSupports();
  addJournalEntry({ ts: new Date().toISOString(), action:'support_created', entityType:'support', entityId:id, entityCode:id, entityLabel:`Support ${id}${notes?' · '+notes:''}`, changes:[] });
  document.getElementById('newSupportNotes').value = '';
  document.getElementById('supportIdPreview').textContent = generateSupportId(type);
  renderSupportList(); showToast(`✓ Support ${id} créé`);
}

function deleteSupport(id) {
  const holder = spools.find(s => s.supportId === id);
  if (holder) { showToast(`⚠ Support assigné à ${holder.code || holder.brand}`); return; }
  supports = supports.filter(s => s.id !== id);
  addJournalEntry({ ts: new Date().toISOString(), action:'support_deleted', entityType:'support', entityId:id, entityCode:id, entityLabel:`Support ${id}`, changes:[] });
  saveSupports(); renderSupportList(); showToast(`🗑 Support ${id} supprimé`);
}
